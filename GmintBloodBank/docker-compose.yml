services:
  postgres:
    image: postgres:17-alpine
    container_name: gmint-bloodbank-db
    environment:
      POSTGRES_DB: GmintBloodBank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../BloodBankManagementSystem_v2.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  pgdata:
